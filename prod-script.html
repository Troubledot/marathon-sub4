<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>正式环境 · script 嵌入</title>
        <style>
            body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #111;
                color: #fff;
                padding: 16px;
            }
        </style>
    </head>
    <body>
        <h1>正式环境 · script 嵌入-未设置认证方式</h1>

        <script>
            const token = '8L4PuZWJu0nyCMdN';
            const baseUrl = 'https://llmhub.cscec.com/agent-build-v3';

            window.difyChatbotConfig = {
                token,
                baseUrl,
                containerProps: {
                    style: {
                        right: '24px',
                        bottom: '24px'
                    },
                    className: 'custom-chat-button'
                },
                draggable: true,
                dragAxis: 'both'
            };

            const embedScript = document.createElement('script');
            embedScript.src = `${baseUrl}/embed.min.js`;
            embedScript.id = token;
            embedScript.defer = true;
            document.body.appendChild(embedScript);
        </script>
    </body>
</html>
