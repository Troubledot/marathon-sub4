                --text-main: #f0f0f0;
                --text-muted: #666666;
                --border: #2a2a2a;
            }

            * {

                -webkit-tap-highlight-color: transparent;
            }

            body {

                color: var(--text-main);
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

                padding: 0 15px 40px 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
                overflow-x: hidden;

            /* 顶部标题区 */
            .header {
                text-align: center;
                margin: 30px 0 20px 0;
                width: 100%;
                max-width: 600px;
            }

            h1 {
                font-size: 2.2rem;
                margin: 0;
                background: linear-gradient(135deg, var(--primary), var(--secondary));

                -webkit-text-fill-color: transparent;
                font-style: italic;
                letter-spacing: 2px;

            h2 {
                font-size: 1rem;
                margin: 0;

                letter-spacing: 1px;

            .subtitle {

                font-size: 0.85rem;
                margin-top: 5px;

            /* 吸顶进度条（手机端核心体验） */

                position: sticky;
                top: 0;
                width: 100%;
                background: rgba(13, 13, 13, 0.95);
                backdrop-filter: blur(10px);
                z-index: 100;
                padding: 15px 0;
                margin-bottom: 20px;
                max-width: 600px;
                border-bottom: 1px solid var(--border);
            }

            .progress-label {
                display: flex;
                justify-content: space-between;
                margin-bottom: 8px;
                font-family: monospace;
                font-weight: bold;
                font-size: 0.9rem;
                color: var(--secondary);
            }

            .progress-bar {
                height: 10px;
                background: #222;
                border-radius: 5px;
                overflow: hidden;
                box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
            }

            #progress-fill {
                height: 100%;
                width: 0%;
                background: linear-gradient(90deg, var(--primary), var(--secondary));
                transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 0 10px var(--primary);

            /* 任务列表区 */

                width: 100%;
                max-width: 600px;
            }

            .gesture-tips {

                max-width: 600px;
                margin: 0 0 14px 0;
                padding: 10px 12px;
                border: 1px solid #2f2f2f;
                border-radius: 10px;
                background: rgba(255, 255, 255, 0.02);
                color: #a9a9a9;
                font-size: 0.82rem;

            .gesture-tips b {

            .race-result-banner {

                max-width: 600px;
                margin: 0 0 14px 0;
                padding: 20px 22px;
                border-radius: 14px;
                border: 1px solid #6b5200;
                background: linear-gradient(135deg, rgba(255, 183, 0, 0.28), rgba(255, 77, 0, 0.22));

                font-weight: 800;
                color: #fff1b8;
                text-align: center;
                letter-spacing: 0.8px;
                display: none;
            }

            .race-result-banner.show {
                display: block;
                animation: raceBannerGlow 1.2s ease-in-out infinite alternate;
            }

            @keyframes raceBannerGlow {
                from {
                    box-shadow: 0 0 12px rgba(255, 183, 0, 0.25);
                }
                to {
                    box-shadow: 0 0 28px rgba(255, 183, 0, 0.6);
                }
            }

            .race-modal {
                position: fixed;
                inset: 0;
                z-index: 1000;
                display: none;
                align-items: center;
                justify-content: center;
                padding: 20px;
                background: rgba(0, 0, 0, 0.7);

            .race-modal.show {
                display: flex;
            }

                border-radius: 14px;

                margin-bottom: 10px;

            .race-modal-actions {
                display: flex;
                gap: 8px;
            }

            .race-btn {

                border-radius: 8px;
                background: #222;
                color: #eee;
                padding: 8px 12px;
                cursor: pointer;
            }

            .race-btn.primary {
                border-color: #ff7a2f;
                background: #ff5f1f;
                color: #fff;
            }

            .race-result-overlay {
                position: fixed;
                inset: 0;
                z-index: 999;
                pointer-events: none;
                opacity: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 20px;

            .race-result-overlay.show {
                animation: raceOverlayInOut 2.4s ease forwards;

                text-shadow: 0 0 14px rgba(0, 0, 0, 0.5);

            }

            .race-result-overlay.regret {
                background: radial-gradient(circle, rgba(255, 77, 77, 0.2), rgba(0, 0, 0, 0));

                height: 14px;

                margin-bottom: 12px;

                position: relative;
                overflow: hidden;

                0% {
                    transform: scale(1);
                    box-shadow: 0 0 0 rgba(0, 229, 255, 0);

                50% {
                    transform: scale(0.98);
                    box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);

                100% {
                    transform: scale(1);

                border-color: rgba(0, 255, 136, 0.3);

            .checkbox {

                height: 26px;

                border-radius: 8px;
                margin-right: 15px;
                display: flex;
                align-items: center;
                justify-content: center;

            }

                color: #000;
                font-weight: bold;
                font-size: 16px;
                opacity: 0;

            }

            .completed .checkbox::after {

            .skipped .checkbox {

                color: #e8e8e8;
                font-size: 12px;
                font-weight: 700;

            const AUTO_SKIP_NOTE = '日切时仍未标记完成，已自动记为跳过';

            let appTasksRef = null;
            let lastSeenTodayKey = '';
            let toastHideTimer = null;

            function getTodayKey() {
                const t = new Date();
                return `${String(t.getMonth() + 1).padStart(2, '0')}.${String(t.getDate()).padStart(2, '0')}`;
            }

            /** @returns {'past'|'today'|'future'} */
            function getDateRelation(taskDate) {
                const today = getTodayKey();
                if (taskDate < today) return 'past';
                if (taskDate > today) return 'future';
                return 'today';
            }

            function showToast(message) {
                const el = document.getElementById('app-toast');
                if (!el) {
                    return;
                }
                el.textContent = message;
                el.classList.add('show');
                if (toastHideTimer) {
                    clearTimeout(toastHideTimer);
                }
                toastHideTimer = setTimeout(() => {
                    el.classList.remove('show');
                }, 2400);
            }

            function applyOverdueAutoSkips(data) {
                const todayK = getTodayKey();
                let changed = false;
                data.forEach(task => {
                    if (task.date < todayK && !task.done && !task.skipped) {
                        task.skipped = true;
                        task.autoSkip = true;
                        task.skipNote = AUTO_SKIP_NOTE;
                        changed = true;
                    }
                });
                return changed;
            }

            function tryDayRolloverAndRefresh() {
                const k = getTodayKey();
                if (k === lastSeenTodayKey) {
                    return;
                }
                lastSeenTodayKey = k;
                if (!appTasksRef) {
                    return;
                }

            function init() {
                // 读取本地存储，保留打勾状态
                const savedData = localStorage.getItem(STORAGE_KEY);
                let currentTasks = planData;

                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    // 合并状态，防止代码更新覆盖已完成的进度
                    currentTasks = planData.map(task => {
                        const savedTask = parsed.find(t => t.id === task.id);
                        return savedTask
                            ? {
                                  ...task,
                                  done: Boolean(savedTask.done),
                                  skipped: Boolean(savedTask.skipped),
                                  skipNote: savedTask.skipNote || '',
                                  extraNote: savedTask.extraNote || '',
                                  autoSkip: Boolean(savedTask.autoSkip)
                              }
                            : task;
                    });
                }
                appTasksRef = currentTasks;
                lastSeenTodayKey = getTodayKey();
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible') {
                        tryDayRolloverAndRefresh();
                    }
                });
                setInterval(tryDayRolloverAndRefresh, 20000);
                bindRaceModalEvents(currentTasks);
                render(currentTasks);
                autoScrollToToday(currentTasks);
            }

            function triggerConfetti() {
                // 完成时两侧撒花
                var duration = 2 * 1000;
                var end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 3,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#ff4d00', '#00e5ff', '#ffffff']
                    });
                    confetti({
                        particleCount: 3,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#ff4d00', '#00e5ff', '#ffffff']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                })();
            }

            function render(data) {
                applyOverdueAutoSkips(data);
                const list = document.getElementById('todo-list');
                list.innerHTML = '';

                let currentWeek = '';
                let completedCount = 0;

                data.forEach((task, index) => {
                    // 渲染周标题
                    if (task.week !== currentWeek) {
                        currentWeek = task.week;
                        const weekTitle = document.createElement('div');
                        weekTitle.className = 'week-title';
                        weekTitle.innerText = currentWeek;
                        list.appendChild(weekTitle);
                    }

                    // 渲染任务卡片
                    const card = document.createElement('div');
                    card.id = `task-${task.id}`;
                    const rel = getDateRelation(task.date);
                    const dayClass = rel === 'today' ? 'day-today' : rel === 'past' ? 'day-past' : 'day-future';
                    let statusClass = '';
                    if (task.skipped) {
                        statusClass = 'skipped';
                    } else if (task.done) {
                        statusClass = 'completed';
                    }
                    const cardClasses = ['task-card', statusClass, dayClass].filter(c => c);
                    card.className = cardClasses.join(' ');
                    const statusText = task.skipped
                        ? `<span class="task-status">[-] ${task.autoSkip ? '自动跳过' : 'SKIPPED'}</span>`
                        : '';
                    const skipNoteText =
                        task.skipped && task.skipNote
                            ? `<div class="task-note">跳过原因：${escapeHtml(task.skipNote)}</div>`
                            : '';
                    const extraNoteText = task.extraNote
                        ? `<div class="task-note">训练备注：${escapeHtml(task.extraNote)}</div>`
                        : '';
                    const noteHint = task.extraNote ? ' · 有备注' : '';

                    card.innerHTML = `
                    <div class="checkbox"></div>
                    <div class="task-info">
                        <div class="task-header">
                            <span class="task-date">${task.date}</span>
                            <span class="tag ${task.tag}">${task.tagText}${noteHint}</span>
                        </div>
                        <div class="task-name">${task.name} ${statusText}</div>
                        <div class="task-desc">${task.desc}</div>
                        ${skipNoteText}
                        ${extraNoteText}
                    </div>
                `;

                    // 绑定点击事件
                    card.onclick = () => handleCardClick(task.id, data, card);
                    card.ondblclick = () => toggleSkip(task.id, data);
                    bindLongPressNote(card, task.id, data);
                    card.oncontextmenu = event => {
                        event.preventDefault();
                        editExtraNote(task.id, data);
                    };
                    list.appendChild(card);

                    if (task.done && !task.skipped) completedCount++;
                });

                updateProgress(completedCount, data.length);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                renderRaceResultBanner();
            }

            let clickTimer = null;
            let longPressTimer = null;
            let suppressClickOnce = false;
            const LONG_PRESS_MS = 450;
            const LONG_PRESS_MOVE_THRESHOLD = 12;

            function handleCardClick(id, data, cardElement) {
                if (suppressClickOnce) {
                    suppressClickOnce = false;
                    return;
                }
                if (clickTimer) {
                    clearTimeout(clickTimer);
                }
                clickTimer = setTimeout(() => {
                    toggleTask(id, data, cardElement);
                    clickTimer = null;
                }, 220);
            }

            function toggleTask(id, data, cardElement) {
                const task = data.find(t => t.id === id);
                if (getDateRelation(task.date) === 'past') {
                    showToast('已过去的计划无法改订，仅可操作「今日」条目。');
                    return;
                }
                if (getDateRelation(task.date) === 'future') {
                    showToast('该日尚未到，请当天再来标记完成。');
                    return;
                }
                if (task.autoSkip) {
                    showToast('系统已按日切自动记为跳过，无法撤销。');
                    return;
                }
                task.done = !task.done;
                if (!task.done && task.id === RACE_TASK_ID) {
                    localStorage.removeItem(RACE_RESULT_KEY);
                }
                if (task.done) {
                    task.skipped = false;
                    task.skipNote = '';
                    task.autoSkip = false;
                }

                // 触发动效
                cardElement.classList.add('pulse-anim');
                setTimeout(() => cardElement.classList.remove('pulse-anim'), 500);

                if (task.done) {
                    triggerConfetti(); // 仅在完成时撒花

                    // 手机震动反馈 (部分安卓浏览器支持)
                    if (navigator.vibrate) navigator.vibrate(50);
                    if (task.id === RACE_TASK_ID) {
                        openRaceModal();
                    }
                }

                // 更新数据与进度条
                render(data);
            }

            function bindLongPressNote(card, taskId, data) {
                let startX = 0;
                let startY = 0;
                let movedTooFar = false;

                const getPoint = event => {
                    if (event.touches && event.touches[0]) {
                        return { x: event.touches[0].clientX, y: event.touches[0].clientY };
                    }
                    if (event.changedTouches && event.changedTouches[0]) {
                        return { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
                    }
                    return { x: event.clientX || 0, y: event.clientY || 0 };
                };

                const start = event => {
                    clearLongPress();
                    movedTooFar = false;
                    const point = getPoint(event);
                    startX = point.x;
                    startY = point.y;
                    longPressTimer = setTimeout(() => {
                        if (movedTooFar) {
                            return;
                        }
                        const t = data.find(x => x.id === taskId);
                        if (!t || getDateRelation(t.date) !== 'today') {
                            if (t) {
                                if (getDateRelation(t.date) === 'past') {
                                    showToast('已过去的计划无法改订，仅可编辑「今日」备注。');
                                } else {
                                    showToast('该日尚未到，请当天再添加备注。');
                                }
                            }
                            return;
                        }
                        suppressClickOnce = true;
                        editExtraNote(taskId, data);
                    }, LONG_PRESS_MS);
                };

                const move = event => {
                    if (!longPressTimer) {
                        return;
                    }
                    const point = getPoint(event);
                    const deltaX = Math.abs(point.x - startX);
                    const deltaY = Math.abs(point.y - startY);
                    if (deltaX > LONG_PRESS_MOVE_THRESHOLD || deltaY > LONG_PRESS_MOVE_THRESHOLD) {
                        movedTooFar = true;
                        clearLongPress();
                    }
                };

                const cancel = () => {
                    clearLongPress();
                };

                card.addEventListener('mousedown', start);
                card.addEventListener('mousemove', move);
                card.addEventListener('mouseup', cancel);
                card.addEventListener('mouseleave', cancel);
                card.addEventListener('touchstart', start, { passive: true });
                card.addEventListener('touchmove', move, { passive: true });
                card.addEventListener('touchend', cancel);
                card.addEventListener('touchcancel', cancel);
            }

            function clearLongPress() {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
            }

            function editExtraNote(id, data) {
                const task = data.find(t => t.id === id);
                if (getDateRelation(task.date) === 'past') {
                    showToast('已过去的计划无法改订，仅可编辑「今日」备注。');
                    return;
                }
                if (getDateRelation(task.date) === 'future') {
                    showToast('该日尚未到，请当天再添加备注。');
                    return;
                }
                const input = prompt('请输入训练备注（可留空清除）：', task.extraNote || '');
                if (input === null) {
                    return;
                }
                task.extraNote = input.trim();
                render(data);
            }

            function toggleSkip(id, data) {
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                }
                const task = data.find(t => t.id === id);
                if (getDateRelation(task.date) === 'past') {
                    showToast('已过去的计划无法改订，仅可在「今日」手动跳过。');
                    return;
                }
                if (getDateRelation(task.date) === 'future') {
                    showToast('该日尚未到，请当天再操作。');
                    return;
                }
                if (task.autoSkip) {
                    showToast('系统已按日切自动记为跳过，无法撤销。');
                    return;
                }
                const nextSkipped = !task.skipped;
                if (nextSkipped) {
                    const input = prompt('请输入跳过原因（备注）：', task.skipNote || '');
                    if (input === null) {
                        return;
                    }
                    task.skipNote = input.trim();
                } else {
                    task.skipNote = '';
                }
                task.skipped = nextSkipped;
                if (task.skipped) {
                    task.done = false;
                    task.autoSkip = false;
                }
                render(data);
            }

            function escapeHtml(value) {
                return String(value)
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;')
                    .replaceAll('"', '&quot;')
                    .replaceAll("'", '&#39;');
            }

            function autoScrollToToday(data) {
                const todayKey = getTodayKey();
                const task = data.find(item => item.date === todayKey);
                if (!task) {
                    return;
                }

                // 等待首屏渲染完成后再滚动
                requestAnimationFrame(() => {
                    const target = document.getElementById(`task-${task.id}`);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }

            function bindRaceModalEvents(data) {
                const modal = document.getElementById('race-modal');
                const input = document.getElementById('race-time-input');
                const submitBtn = document.getElementById('race-submit-btn');
                const cancelBtn = document.getElementById('race-cancel-btn');

                submitBtn.onclick = () => handleRaceSubmit(data);
                cancelBtn.onclick = () => closeRaceModal();
                input.addEventListener('keydown', event => {
                    if (event.key === 'Enter') {
                        handleRaceSubmit(data);
                    }
                });
                modal.addEventListener('click', event => {
                    if (event.target === modal) {
                        closeRaceModal();
                    }
                });
            }

            function openRaceModal() {
                const modal = document.getElementById('race-modal');
                const input = document.getElementById('race-time-input');
                input.value = '';
                modal.classList.add('show');
                setTimeout(() => input.focus(), 0);
            }

            function closeRaceModal() {
                const modal = document.getElementById('race-modal');
                modal.classList.remove('show');
            }

            function handleRaceSubmit(data) {
                const input = document.getElementById('race-time-input');
                const raw = input.value.trim();
                const normalized = raw.toLowerCase();
                if (normalized === 'dnf' || raw === '退赛') {
                    const classification = {
                        status: 'regret',
                        title: '很遗憾',
                        subtitle: '这次没能顺利完赛，但你已经很勇敢。'
                    };
                    playRaceCeremony(classification, raw.toUpperCase());
                    saveRaceResult(classification, raw.toUpperCase());
                    closeRaceModal();
                    render(data);
                    return;
                }

                const parsed = parseRaceTime(raw);
                if (!parsed) {
                    alert('请输入有效成绩，例如 03:58:20');
                    return;
                }

                const classification = classifyRaceResult(parsed.totalSeconds);
                playRaceCeremony(classification, parsed.display);
                saveRaceResult(classification, parsed.display);
                closeRaceModal();
                render(data);
            }

            function parseRaceTime(raw) {
                const match = raw.match(/^(\d{1,2}):([0-5]\d):([0-5]\d)$/);
                if (!match) {
                    return null;
                }
                const hours = Number(match[1]);
                const minutes = Number(match[2]);
                const seconds = Number(match[3]);
                const totalSeconds = hours * 3600 + minutes * 60 + seconds;
                const display = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                return { totalSeconds, display };
            }

            function classifyRaceResult(totalSeconds) {
                if (totalSeconds <= 3 * 3600 + 59 * 60 + 59) {
                    return { status: 'achieved', title: '目标达成', subtitle: 'Sub-4 成功，今天属于你！' };
                }
                if (totalSeconds <= 4 * 3600 + 15 * 60) {
                    return { status: 'missed', title: '目标未达成', subtitle: '差一点点，下次一定破4。' };
                }
                if (totalSeconds <= 4 * 3600 + 45 * 60) {
                    return { status: 'far', title: '差得远', subtitle: '先稳住节奏，继续积累训练。' };
                }
                return { status: 'regret', title: '很遗憾', subtitle: '今天状态一般，慢慢来，别否定自己。' };
            }

            function playRaceCeremony(classification, displayTime) {
                const overlay = document.getElementById('race-result-overlay');
                const text = document.getElementById('race-result-text');
                overlay.className = `race-result-overlay ${classification.status}`;
                text.textContent = `${classification.title}\n${displayTime}\n${classification.subtitle}`;
                overlay.classList.add('show');

                if (classification.status === 'achieved') {
                    triggerConfetti();
                } else if (navigator.vibrate) {
                    navigator.vibrate([30, 60, 30]);
                }

                setTimeout(() => {
                    overlay.classList.remove('show');
                    scrollToRaceBanner();
                }, 2400);
            }

            function saveRaceResult(classification, displayTime) {
                const payload = {
                    status: classification.status,
                    title: classification.title,
                    time: displayTime
                };
                localStorage.setItem(RACE_RESULT_KEY, JSON.stringify(payload));
            }

            function renderRaceResultBanner() {
                const banner = document.getElementById('race-result-banner');
                const saved = localStorage.getItem(RACE_RESULT_KEY);
                if (!saved) {
                    banner.classList.remove('show');
                    banner.textContent = '';
                    return;
                }
                const payload = JSON.parse(saved);
                if (payload.status === 'achieved') {
                    banner.textContent = `目标达成！全马成绩 ${payload.time}`;
                    banner.classList.add('show');
                } else {
                    banner.classList.remove('show');
                    banner.textContent = '';
                }
            }

            function scrollToRaceBanner() {
                const banner = document.getElementById('race-result-banner');
                if (banner && banner.classList.contains('show')) {
                    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function updateProgress(completed, total) {
                const percent = Math.round((completed / total) * 100);
                document.getElementById('progress-fill').style.width = percent + '%';
                document.getElementById('progress-percent').innerText = `${completed}/${total} [${percent}%]`;
            }

            init();
        </script>
